{% extends 'base.html' %}

{% block title %}Login | Intraday Smart PDH/PDL{% endblock %}

{% block content %}
<section class="auth-card">
    <h1>Login</h1>
    <p>Sign in to launch and monitor your SmartAPI PDH/PDL sessions.</p>

    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.non_field_errors }}

        <label>
            Username
            {{ form.username }}
        </label>

        <label>
            Password
            {{ form.password }}
        </label>

        <label>
            OTP (if enabled)
            {{ form.otp_token }}
        </label>

        <button type="submit" class="btn">Login</button>
    </form>

    <p class="mt-16">New here? <a href="{% url 'accounts:register' %}">Create account</a></p>
</section>
{% endblock %}
